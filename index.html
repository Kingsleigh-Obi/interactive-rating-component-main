<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/index.css">
  <title>Frontend Mentor | Interactive rating component</title>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="image-box">
        <img src="./images/icon-star.svg" alt="">
      </div>
      
      <div class="text-box">
        <h1>How did we do?</h1>
        <p class="description">
          Please let us know how we did with your support request. All feedback is appreciated 
          to help us improve our offering!
        </p>
  
        <div class="numbers-flexbox">
          <div class="js-number-rating">1</div>
          <div class="js-number-rating">2</div>
          <div class="js-number-rating">3</div>
          <div class="js-number-rating">4</div>
          <div class="js-number-rating">5</div>
        </div>
  
        <button class="submit-btn js-submit-button">SUBMIT</button>
      </div>
    </div>
  </div>
  <script src="scripts/index.js"></script>
</body>
</html>
